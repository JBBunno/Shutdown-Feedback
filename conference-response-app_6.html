
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conference Response</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Calibri:wght@300;400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Calibri', 'Calibri Light', system-ui, sans-serif;
    font-weight: 300;
    background: #0b1c33;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
  }
  .logo-wrap {
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .logo-wrap img {
    height: 52px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  .card {
    background: #112240;
    border: 1px solid rgba(193,156,75,0.2);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 580px;
    width: 100%;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c19c4b;
    margin-bottom: 0.5rem;
  }
  .question-box {
    background: rgba(193,156,75,0.08);
    border-left: 4px solid #c19c4b;
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    min-height: 56px;
  }
  .question-text {
    font-size: 1.2rem;
    font-weight: 400;
    color: #e8e8e8;
    line-height: 1.4;
  }
  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 400;
    color: #a0b0c8;
    margin-bottom: 6px;
  }
  textarea {
    width: 100%;
    border: 1px solid rgba(193,156,75,0.3);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 16px;
    font-family: inherit;
    font-weight: 300;
    resize: vertical;
    min-height: 130px;
    color: #e8e8e8;
    background: rgba(255,255,255,0.05);
    transition: border-color 0.15s;
    outline: none;
    margin-bottom: 1rem;
  }
  textarea:focus { border-color: #c19c4b; background: rgba(255,255,255,0.08); }
  textarea::placeholder { color: #4a6080; }
  input[type="text"], input[type="password"] {
    width: 100%;
    border: 1px solid rgba(193,156,75,0.3);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 15px;
    font-family: inherit;
    font-weight: 300;
    color: #e8e8e8;
    background: rgba(255,255,255,0.05);
    transition: border-color 0.15s;
    outline: none;
    margin-bottom: 1rem;
  }
  input[type="text"]:focus, input[type="password"]:focus { border-color: #c19c4b; background: rgba(255,255,255,0.08); }
  input::placeholder { color: #4a6080; }
  .btn {
    width: 100%;
    background: #c19c4b;
    color: #0b1c33;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 0;
  }
  .btn:hover { background: #d4ac58; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #3a4a5a; color: #6a7a8a; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: #c19c4b;
    border: 1.5px solid #c19c4b;
    margin-top: 0.75rem;
  }
  .btn-secondary:hover { background: rgba(193,156,75,0.1); }
  .btn-danger {
    background: transparent;
    color: #e74c3c;
    border: 1.5px solid #e74c3c;
    margin-top: 0.75rem;
  }
  .btn-danger:hover { background: rgba(231,76,60,0.1); }
  .success {
    text-align: center;
    padding: 1.5rem 0;
  }
  .tick { font-size: 3.5rem; margin-bottom: 1rem; }
  .success h2 { font-size: 1.3rem; color: #e8e8e8; margin-bottom: 0.5rem; font-weight: 400; }
  .success p { color: #a0b0c8; font-size: 15px; }
  .error-msg {
    color: #e74c3c;
    font-size: 13px;
    margin-bottom: 0.75rem;
    padding: 0.6rem 0.9rem;
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    display: none;
  }
  .info-msg {
    color: #c19c4b;
    font-size: 13px;
    margin-bottom: 0.75rem;
    padding: 0.6rem 0.9rem;
    background: rgba(193,156,75,0.1);
    border: 1px solid rgba(193,156,75,0.3);
    border-radius: 8px;
    display: none;
  }
  .footer {
    margin-top: 1.5rem;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(193,156,75,0.4);
    text-transform: uppercase;
    text-align: center;
  }

  /* Presenter panel styles */
  .presenter-header {
    background: rgba(193,156,75,0.12);
    border: 1px solid rgba(193,156,75,0.3);
    color: #c19c4b;
    border-radius: 10px;
    padding: 0.75rem 1.1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .presenter-dot {
    width: 10px;
    height: 10px;
    background: #4af78a;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .current-q-preview {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 14px;
    color: #a0b0c8;
    margin-bottom: 1.25rem;
    min-height: 42px;
  }
  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin: 1.25rem 0;
  }
</style>
</head>
<body>
<div class="logo-wrap">
  <img src="https://static.wixstatic.com/media/ebac84_5fa2badf87b241a1b4fc82029b013974~mv2.png" alt="PalmCrest">
</div>
<div class="card" id="main-card">
  <div id="loading-view">
    <p style="color:#888;font-size:15px;">Loading…</p>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxELRsN2Cu9IGiU9HTRxhqzRGGKTX4vjbj3_YcZcUdO1Rxe66b5zR6GvwJJ-ROhhapUEA/exec";
var PRESENTER_PASS = "palmcrest";
var currentQuestion = "";

var params = new URLSearchParams(window.location.search);
var isPresenter = params.get("presenter") === "1";

function loadQuestion(callback) {
  var done = false;
  function finish(q) {
    if (done) return;
    done = true;
    currentQuestion = q || "";
    if (callback) callback();
  }
  // 5 second timeout — render the page regardless
  var timer = setTimeout(function() { finish(""); }, 5000);
  fetch(SCRIPT_URL + "?action=getQuestion")
    .then(function(r){ return r.json(); })
    .then(function(d){ clearTimeout(timer); finish(d.question); })
    .catch(function(){ clearTimeout(timer); finish(""); });
}

function renderAudience() {
  var card = document.getElementById("main-card");
  card.innerHTML = [
    '<div id="form-view">',
      '<p class="label">Question for discussion</p>',
      '<div class="question-box">',
        '<p class="question-text" id="question-display">' + (currentQuestion || "Awaiting question from presenter…") + '</p>',
      '</div>',
      '<label class="field-label" for="response">Your response</label>',
      '<textarea id="response" placeholder="Type your answer here…"></textarea>',
      '<label class="field-label" for="name">Your name <span style="color:#aaa;font-weight:400">(optional)</span></label>',
      '<input type="text" id="name" placeholder="e.g. Jane Smith" style="margin-bottom:1.5rem">',
      '<p class="error-msg" id="error-msg"></p>',
      '<button class="btn" id="submit-btn" onclick="submitResponse()">Submit response</button>',
    '</div>',
    '<div id="success-view" class="success" style="display:none">',
      '<div class="tick">✅</div>',
      '<h2>Response submitted!</h2>',
      '<p style="margin-bottom:1.5rem">Thank you — your answer has been recorded.</p>',
      '<button class="btn btn-secondary" onclick="resetForm()">Next question ↺</button>',
    '</div>'
  ].join("");

  setInterval(function() {
    fetch(SCRIPT_URL + "?action=getQuestion")
      .then(function(r){ return r.json(); })
      .then(function(d){
        var q = d.question || "Awaiting question from presenter…";
        var el = document.getElementById("question-display");
        if (el && q !== currentQuestion) {
          currentQuestion = q;
          el.textContent = q;
        }
      }).catch(function(){});
  }, 8000);
}

function submitResponse() {
  var response = document.getElementById("response").value.trim();
  var name = document.getElementById("name").value.trim();
  var errEl = document.getElementById("error-msg");
  errEl.style.display = "none";

  if (!response) {
    errEl.textContent = "Please enter a response before submitting.";
    errEl.style.display = "block";
    return;
  }

  var btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Submitting…";

  var params = new URLSearchParams({
    response: response,
    name: name || "(anonymous)",
    question: currentQuestion,
    timestamp: new Date().toISOString()
  });

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params.toString()
  })
  .then(function() {
    document.getElementById("form-view").style.display = "none";
    document.getElementById("success-view").style.display = "block";
  })
  .catch(function() {
    errEl.textContent = "Submission failed. Check your connection and try again.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Submit response";
  });
}

function renderPresenterLogin() {
  var card = document.getElementById("main-card");
  card.innerHTML = [
    '<p class="label">Presenter access</p>',
    '<p style="font-size:14px;color:#666;margin-bottom:1.25rem;">Enter the presenter password to manage questions.</p>',
    '<input type="password" id="pass-input" placeholder="Password" onkeydown="if(event.key===\'Enter\')checkPass()">',
    '<p class="error-msg" id="pass-error">Incorrect password.</p>',
    '<button class="btn" onclick="checkPass()">Continue</button>'
  ].join("");
}

function checkPass() {
  var val = document.getElementById("pass-input").value;
  var err = document.getElementById("pass-error");
  if (val === PRESENTER_PASS) {
    renderPresenterPanel();
  } else {
    err.style.display = "block";
  }
}

function renderPresenterPanel() {
  var card = document.getElementById("main-card");
  card.innerHTML = [
    '<div class="presenter-header"><div class="presenter-dot"></div>Presenter control panel</div>',
    '<p class="label">Current question (live)</p>',
    '<div class="current-q-preview" id="current-q-preview">' + (currentQuestion || '<span style="color:#aaa">No question set yet</span>') + '</div>',
    '<hr class="divider">',
    '<p class="label" style="margin-bottom:0.5rem">Set new question</p>',
    '<textarea id="new-question" placeholder="Type your next question here…" style="min-height:100px;margin-bottom:0.5rem"></textarea>',
    '<p class="info-msg" id="info-msg">Question updated!</p>',
    '<p class="error-msg" id="set-error">Failed to update. Try again.</p>',
    '<button class="btn" id="set-btn" onclick="pushQuestion()">Push question to audience</button>',
    '<button class="btn btn-secondary" onclick="refreshCount()">Refresh response count</button>',
    '<hr class="divider">',
    '<p class="label">Responses received</p>',
    '<p style="font-size:1.5rem;font-weight:700;color:#c19c4b;margin-top:0.25rem;margin-bottom:0.25rem" id="resp-count">—</p>',
    '<p style="font-size:12px;color:#6a8aaa;margin-top:4px;margin-bottom:1.25rem">Open your Google Sheet to read responses live.</p>',
    '<hr class="divider">',
    '<p class="label" style="margin-bottom:0.75rem">AI Trend Summary</p>',
    '<button class="btn" id="ai-btn" onclick="generateSummary()" style="margin-bottom:0.75rem">&#x2728; Generate trending summary</button>',
    '<div id="ai-report" style="display:none;background:rgba(193,156,75,0.06);border:1px solid rgba(193,156,75,0.2);border-radius:10px;padding:1.25rem;font-size:14px;line-height:1.7;color:#d0d8e8;white-space:pre-wrap;margin-top:0.25rem"></div>',
    '<p class="error-msg" id="ai-error">Failed to generate summary. Try again.</p>'
  ].join("");

  refreshCount();
}

function pushQuestion() {
  var q = document.getElementById("new-question").value.trim();
  var infoEl = document.getElementById("info-msg");
  var errEl = document.getElementById("set-error");
  infoEl.style.display = "none";
  errEl.style.display = "none";

  if (!q) return;

  var btn = document.getElementById("set-btn");
  btn.disabled = true;

  var body = new URLSearchParams({ action: "setQuestion", question: q });

  function attempt(attemptsLeft) {
    btn.textContent = "Pushing" + (attemptsLeft < 3 ? " (retry " + (3 - attemptsLeft + 1) + ")…" : "…");
    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString()
    })
    .then(function() {
      // With no-cors we can't read the response, so verify by fetching the question back
      return fetch(SCRIPT_URL + "?action=getQuestion");
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.question === q) {
        currentQuestion = q;
        document.getElementById("current-q-preview").textContent = q;
        document.getElementById("new-question").value = "";
        infoEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Push question to audience";
        setTimeout(function(){ infoEl.style.display = "none"; }, 3000);
      } else if (attemptsLeft > 1) {
        setTimeout(function() { attempt(attemptsLeft - 1); }, 1500);
      } else {
        errEl.textContent = "Failed after 3 attempts. Try again.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Push question to audience";
      }
    })
    .catch(function() {
      if (attemptsLeft > 1) {
        setTimeout(function() { attempt(attemptsLeft - 1); }, 1500);
      } else {
        errEl.textContent = "Failed after 3 attempts. Check your connection.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Push question to audience";
      }
    });
  }

  attempt(3);
}

function refreshCount() {
  fetch(SCRIPT_URL + "?action=getCount")
    .then(function(r){ return r.json(); })
    .then(function(d){
      var el = document.getElementById("resp-count");
      if (el) el.textContent = d.count !== undefined ? d.count : "—";
    }).catch(function(){});
}

function generateSummary() {
  var btn = document.getElementById("ai-btn");
  var reportEl = document.getElementById("ai-report");
  var errEl = document.getElementById("ai-error");
  errEl.style.display = "none";
  reportEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Fetching responses…";

  fetch(SCRIPT_URL + "?action=getResponses")
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.rows || data.rows.length === 0) {
        errEl.textContent = "No responses yet to summarise.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "✨ Generate trending summary";
        return;
      }

      // Group responses by question
      var groups = {};
      data.rows.forEach(function(row) {
        var q = row.question || "No question";
        var r = row.response || "";
        if (!groups[q]) groups[q] = [];
        if (r) groups[q].push(r);
      });

      var prompt = "You are analysing audience responses from a conference Q&A session. For each question, identify the top 3-5 trending themes and key points. Be concise and direct - this will be shown on a projector.\n\nFormat each question as:\nQUESTION: [question]\nTRENDS:\n- [trend/key point]\n- [trend/key point]\n\n---\n\n";

      Object.keys(groups).forEach(function(q) {
        prompt += "QUESTION: " + q + "\n";
        prompt += "RESPONSES (" + groups[q].length + " total):\n";
        groups[q].forEach(function(r, i) { prompt += (i+1) + ". " + r + "\n"; });
        prompt += "\n";
      });

      btn.textContent = "Analysing with AI…";

      fetch(SCRIPT_URL + "?action=aiSummary&prompt=" + encodeURIComponent(prompt))
      .then(function(r){ return r.json(); })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        reportEl.textContent = d.summary;
        reportEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "✨ Regenerate summary";
      })
      .catch(function(e) {
        errEl.textContent = "AI summary failed. " + (e.message || "Try again.");
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "✨ Generate trending summary";
      });
    })
    .catch(function() {
      errEl.textContent = "Could not fetch responses from sheet.";
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "✨ Generate trending summary";
    });
}

function resetForm() {
  loadQuestion(function() {
    renderAudience();
  });
}

loadQuestion(function() {
  if (isPresenter) {
    renderPresenterLogin();
  } else {
    renderAudience();
  }
});
</script>
</body>
</html>
